<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <!-- Shield icon -->
  <rect width="44" height="44" x="0" y="4" rx="10" fill="rgba(232,160,74,0.12)"/>
  <!-- Headset arc -->
  <path d="M11 30C11 22.268 17.268 16 25 16C32.732 16 39 22.268 39 30"
        stroke="#e8a04a" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="25" cy="30" r="2.5" fill="#e8a04a"/>
  <!-- Left earpiece -->
  <path d="M11 30L8 32.5" stroke="#e8a04a" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Right earpiece -->
  <path d="M39 30L42 32.5" stroke="#e8a04a" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Antenna -->
  <line x1="25" y1="12" x2="25" y2="15.5" stroke="#e8a04a" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Check mark (small, top-right of shield area) -->
  <circle cx="36" cy="14" r="5" fill="#100f0d"/>
  <circle cx="36" cy="14" r="5" fill="rgba(82,201,122,0.15)" stroke="rgba(82,201,122,0.4)" stroke-width="1"/>
  <path d="M33.5 14L35.2 15.8L38.5 12.5" stroke="#52c97a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "Never" wordmark -->
  <text x="56" y="33"
        font-family="'Playfair Display', Georgia, serif"
        font-size="26"
        font-weight="800"
        letter-spacing="-0.5"
        fill="#f5efe8">Never</text>

  <!-- "Miss" wordmark -->
  <text x="136" y="33"
        font-family="'Playfair Display', Georgia, serif"
        font-size="26"
        font-weight="800"
        letter-spacing="-0.5"
        fill="#e8a04a">Miss</text>
</svg>
